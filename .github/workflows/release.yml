name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Extract version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build MapFrontiers API
        run: |
          git clone --depth=1 https://github.com/alejandrocoria/MapFrontiers-API.git /tmp/mapfrontiers-api
          cd /tmp/mapfrontiers-api && ./gradlew publishToMavenLocal

      - name: Build
        run: gradle build -Pversion=${{ steps.vars.outputs.version }}

      - name: Locate release jar
        id: jar
        run: |
          JAR=$(find build/libs -name "*.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-sources.jar" \
            | head -1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Cobblemon Initiative ${{ github.ref_name }}"
          files: ${{ steps.jar.outputs.jar_path }}
          generate_release_notes: true
